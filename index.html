<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi Vocab Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <button onclick="switchTab('quiz')" id="nav-quiz" class="active">Học tập</button>
            <button onclick="switchTab('data')" id="nav-data">Dữ liệu</button>
        </nav>

        <section id="section-quiz" class="section active">
            <div id="statsDisplay" class="stats-bar">L1: 0 | L2: 0 | L3: 0 | L4: 0 | L5: 0</div>
            
            <div id="quiz-ui">
                <div id="q-meta" class="meta-info">Đang tải...</div>
                <div id="q-text" class="question-text">Câu hỏi sẽ hiện ở đây</div>
                <div id="q-options" class="options-grid"></div>
                <div id="feedback" class="feedback"></div>
                <button id="btn-next" onclick="generateQuestion()" style="display:none;" class="btn-main">Tiếp theo</button>
            </div>

            <div id="empty-ui" style="display:none;">
                <p>Chưa có dữ liệu vựng. Vui lòng sang tab Dữ liệu để nhập.</p>
            </div>
        </section>

        <section id="section-data" class="section">
            <h3>Quản lý dữ liệu (CSV)</h3>
            <textarea id="csvTextArea" placeholder="STT,Thuật ngữ,Tên đầy đủ,Nghĩa tiếng Việt,Cấp độ,Ghi chú,LastDate,Interval,EF"></textarea>
            
            <div class="button-group">
                <button onclick="importFromCSVText(document.getElementById('csvTextArea').value)" class="btn-sub">Lưu tại máy</button>
                <button onclick="pushToCloudflare()" class="btn-cloud-push">☁️ Đồng bộ lên Cloud</button>
                <button onclick="fetchFromCloudflare()" class="btn-cloud-fetch">📥 Tải từ Cloud</button>
            </div>
            
            <p class="note">Mẹo: Luôn "Đồng bộ lên Cloud" sau khi học xong để không mất dữ liệu.</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
